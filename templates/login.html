{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your ResQmap account</p>

    <div id="alert-error" class="alert alert-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('alert-error');
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  const body = new URLSearchParams({
    username: document.getElementById('email').value,
    password: document.getElementById('password').value,
  });

  try {
    const r = await fetch('/api/users/token', { method: 'POST', body });
    const data = await r.json();
    if (!r.ok) {
      errEl.textContent = data.detail || 'Login failed. Check your credentials.';
      errEl.classList.add('show');
      return;
    }
    setToken(data.access_token);
    localStorage.setItem('_loginTime', new Date().toISOString());
    await loadCurrentUser();
    window.location.href = '/map';
  } catch {
    errEl.textContent = 'Network error. Please try again.';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
{% endblock %}
